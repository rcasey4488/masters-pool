<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2026 Masters Pool</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛳</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<style>
:root{--g:#006747;--gd:#004d35;--gold:#d4a843;--cr:#faf8f0;--dk:#1a1a1a;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cr);font-family:'Source Sans 3',Georgia,serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pf{font-family:'Playfair Display',serif}
.ss{font-family:'Source Sans 3',sans-serif}
button{cursor:pointer;border:none;font-family:'Source Sans 3',sans-serif;transition:all .12s}
button:hover{opacity:.88}button:active{transform:scale(.97)}
.chip{display:inline-block;padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .1s;border:1px solid #ddd;background:#f8f7f2;color:var(--dk)}
.chip:hover{transform:scale(1.03)}
.chip.on{background:var(--g);color:white;border:2px solid var(--gold);font-weight:600}
.card{background:white;border:1px solid #e0e0e0;border-radius:12px;margin-bottom:10px;overflow:hidden;transition:box-shadow .2s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--dk);color:var(--gold);padding:10px 22px;border-radius:8px;font-size:13px;z-index:999;animation:fadeIn .3s;white-space:nowrap;pointer-events:none}
.ld{width:8px;height:8px;border-radius:50%;background:#4caf50;display:inline-block;animation:pulse 1.5s infinite;margin-right:5px}
input[type=number],select{font-family:'Source Sans 3',sans-serif}
::-webkit-scrollbar{height:5px;width:5px}::-webkit-scrollbar-thumb{background:#00674744;border-radius:3px}
.hdr{background:linear-gradient(135deg,var(--g),var(--gd));padding:18px 14px 10px;border-bottom:3px solid var(--gold)}
.hdr-in{max-width:800px;margin:0 auto}
.nav{display:flex;gap:3px;margin-top:10px;overflow-x:auto;padding-bottom:2px}
.nav button{padding:6px 13px;border-radius:7px 7px 0 0;font-size:12px;font-weight:400;white-space:nowrap;background:rgba(255,255,255,.07);color:rgba(255,255,255,.7)}
.nav button.act{background:var(--gold);color:var(--dk);font-weight:600}
.main{max-width:800px;margin:0 auto;padding:12px 10px 80px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 5px;text-align:center}
td{padding:6px 4px;text-align:center}
.sticky{position:sticky;left:0;z-index:1;text-align:left;padding-left:8px}
.who-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.who-box{background:white;border-radius:16px;padding:28px 24px;max-width:360px;width:90%;text-align:center}
.who-box h2{color:var(--g);margin-bottom:6px}
.who-box p{color:#888;font-size:13px;margin-bottom:18px}
.who-btn{display:block;width:100%;padding:11px;margin-bottom:6px;border-radius:10px;font-size:15px;font-weight:600;background:var(--cr);border:2px solid var(--g);color:var(--g);text-align:center}
.who-btn:hover{background:var(--g);color:white}
</style>
</head>
<body>

<div id="app"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--g)"><div class="pf" style="color:var(--gold);font-size:24px;animation:pulse 1.5s infinite">Loading Pool...</div></div></div>

<script>
// ═══════════════════════════════════════════════════════
// FIREBASE — CONFIGURED
// ═══════════════════════════════════════════════════════

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyD3RBCwBkMQKkKKGdDEY0Q1DoNVnS_jmhM",
  authDomain: "the-masters-pool-2026.firebaseapp.com",
  databaseURL: "https://the-masters-pool-2026-default-rtdb.firebaseio.com",
  projectId: "the-masters-pool-2026",
  storageBucket: "the-masters-pool-2026.firebasestorage.app",
  messagingSenderId: "559798790391",
  appId: "1:559798790391:web:274b7de09ff4395c8b4bf2"
};

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const dbRef = db.ref('masters-pool-2026');

// ═══════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════

const MEMBERS = ["Casey","Harrison","Rhoden","Bickley","Vaughn","Davis","Radcliffe","Waldron","Lantrip","Werthman","Hardman"];
const COMMISSIONER = "Casey";

const TIERS = {
  1:{label:"Tier 1 — Elite",golfers:["Scottie Scheffler","Rory McIlroy","Ludvig Åberg","Bryson DeChambeau","Jon Rahm","Xander Schauffele"]},
  2:{label:"Tier 2 — Contenders",golfers:["Collin Morikawa","Tommy Fleetwood","Matt Fitzpatrick","Cameron Young","Hideki Matsuyama","Patrick Reed","Tyrrell Hatton","Brooks Koepka"]},
  3:{label:"Tier 3 — Solid",golfers:["Justin Thomas","Viktor Hovland","Shane Lowry","Patrick Cantlay","Sam Burns","Robert MacIntyre","Russell Henley","Justin Rose","Keegan Bradley","Sungjae Im","Cameron Smith","Adam Scott"]},
  4:{label:"Tier 4 — Mid-Range",golfers:["Akshay Bhatia","Sepp Straka","Ben Griffin","Chris Gotterup","Jason Day","Jordan Spieth","Wyndham Clark","Corey Conners","Min Woo Lee","Max Homa","Kurt Kitayama","Harris English"]},
  5:{label:"Tier 5 — Sleepers",golfers:["Aaron Rai","Si Woo Kim","Alex Noren","Brian Harman","Ryan Fox","Nick Taylor","J.J. Spaun","Maverick McNealy","Davis Riley","Sam Stevens","Andrew Novak","Max Greyserman","Harry Hall","Nicolai Højgaard"]},
  6:{label:"Tier 6 — Long Shots",golfers:["Marco Penge","Tom McKibbin","Michael Kim","Kristoffer Reitan","Sami Välimäki","Michael Brennan","Rasmus Højgaard","Ryan Gerard","Johnny Keefer","Aldrich Potgieter","Nico Echavarría","Jake Knapp","Daniel Berger","Tiger Woods","Phil Mickelson","Sergio García","Dustin Johnson","Bubba Watson","Matt McCarty","Carlos Ortiz"]}
};

const ALL_G = Object.values(TIERS).flatMap(t=>t.golfers);
const strip = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();

function matchName(n) {
  if(ALL_G.includes(n)) return n;
  const sn = strip(n);
  for(const g of ALL_G) if(strip(g)===sn) return g;
  const parts = n.split(" ");
  const last = strip(parts[parts.length-1]);
  for(const g of ALL_G) { const gl=strip(g.split(" ").pop()); if(gl===last) return g; }
  return null;
}

const DEFAULT_STATE = {picks:{},tiebreakers:{},locked:false,espnScores:{},cutList:[],lastFetch:null,currentRound:0,manualScores:{},winningScore:null};

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════

let STATE = {...DEFAULT_STATE};
let currentUser = localStorage.getItem('masters-pool-user') || null;
let currentView = 'leaderboard';
let fetching = false;
let toastMsg = '';
let toastTimer = null;
let pickForMember = null;

function saveState() {
  dbRef.set(STATE);
}

function loadState(cb) {
  dbRef.on('value', snap => {
    const d = snap.val();
    if (d) STATE = {...DEFAULT_STATE, ...d, cutList: d.cutList||[], picks: d.picks||{}, tiebreakers: d.tiebreakers||{}, espnScores: d.espnScores||{}, manualScores: d.manualScores||{}};
    cb();
  });
}

function flash(msg) {
  toastMsg = msg; render();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastMsg = ''; render(); }, 2500);
}

// ═══════════════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════════════

function golferScore(g) {
  const e = STATE.espnScores?.[g], m = STATE.manualScores?.[g], cut = (STATE.cutList||[]).includes(g);
  const rounds = [null,null,null,null];
  for(let i=0;i<4;i++){
    if(m&&m[i]!==undefined&&m[i]!==null) rounds[i]=Number(m[i]);
    else if(e&&e.rounds&&e.rounds[i]!==null&&e.rounds[i]!==undefined) rounds[i]=Number(e.rounds[i]);
    else if(i>=2&&cut) rounds[i]=80;
  }
  let tot=0,cnt=0; for(const r of rounds) if(r!==null){tot+=r;cnt++;}
  // Parse toPar as a number for live scoring (e.g. "+2" → 2, "-3" → -3, "E" → 0)
  let livePar = null;
  const tp = e?.toPar||"";
  if(tp==='E'||tp==='e') livePar=0;
  else { const pn=parseInt(tp); if(!isNaN(pn)) livePar=pn; }
  return {rounds,total:cnt>0?tot:null,played:cnt,toPar:tp,livePar,position:e?.position||"",isCut:cut,thru:e?.thru||""};
}

function memberResult(member) {
  const p = STATE.picks?.[member];
  if(!p) return {best4:null,livePar:null,details:[],tb:null,cnt:0};
  const det = [];
  for(let t=1;t<=6;t++){
    const g=p[t]; if(!g){det.push({tier:t,golfer:null,total:null,livePar:null,isCut:false});continue;}
    const s=golferScore(g); det.push({tier:t,golfer:g,...s});
  }
  // Best 4 of 6 by completed stroke totals
  const valid=det.filter(d=>d.total!==null).sort((a,b)=>a.total-b.total);
  const b4set=new Set(valid.slice(0,4).map(d=>d.tier));
  const b4=valid.length>=4?valid.slice(0,4).reduce((s,d)=>s+d.total,0):(valid.length>0?valid.reduce((s,d)=>s+d.total,0):null);

  // Live to-par pool score: best 4 of 6 by livePar
  const liveValid=det.filter(d=>d.livePar!==null).sort((a,b)=>a.livePar-b.livePar);
  const liveSet=new Set(liveValid.slice(0,4).map(d=>d.tier));
  const lp=liveValid.length>0?liveValid.slice(0,Math.min(4,liveValid.length)).reduce((s,d)=>s+d.livePar,0):null;

  // Use live set for "used" markers if no completed rounds yet
  const useSet = valid.length>0 ? b4set : liveSet;
  return {best4:b4,livePar:lp,details:det.map(d=>({...d,used:useSet.has(d.tier)})),tb:STATE.tiebreakers?.[member]??null,cnt:Object.keys(p).length};
}

function getBoard() {
  return MEMBERS.map(m=>({name:m,...memberResult(m)})).sort((a,b)=>{
    // Sort by best4 stroke total if available
    if(a.best4!==null&&b.best4!==null){
      if(a.best4!==b.best4) return a.best4-b.best4;
    }
    // If neither has stroke totals, sort by livePar
    if(a.best4===null&&b.best4===null){
      if(a.livePar!==null&&b.livePar!==null){
        if(a.livePar!==b.livePar) return a.livePar-b.livePar;
      }
      if(a.livePar===null&&b.livePar===null) return 0;
      if(a.livePar===null) return 1;
      return -1;
    }
    // One has stroke total the other doesn't — stroke total first
    if(a.best4===null) return 1;
    if(b.best4===null) return -1;
    // Tiebreaker
    if(STATE.winningScore!==null&&a.tb!==null&&b.tb!==null) return Math.abs(a.tb-STATE.winningScore)-Math.abs(b.tb-STATE.winningScore);
    return 0;
  });
}

function getAllPicked() {
  const s=new Set(); Object.values(STATE.picks||{}).forEach(p=>{if(p)Object.values(p).forEach(g=>{if(g)s.add(g);})}); return s;
}

// ═══════════════════════════════════════════════════════
// ESPN
// ═══════════════════════════════════════════════════════

async function fetchESPN() {
  fetching=true; render();
  try {
    let success = false;

    // ── ATTEMPT 1: ESPN endpoints ──
    const urls = [
      "https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard",
      "https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard?dates=" + new Date().toISOString().slice(0,10).replace(/-/g,''),
      "https://site.web.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard?event=401811941"
    ];
    for(const url of urls) {
      try {
        const r = await fetch(url);
        const d = await r.json();
        let competitors = null;
        // Check various ESPN response formats
        if(d?.events) {
          const found = (d.events||[]).find(e=>e.name?.toLowerCase().includes("masters")||e.shortName?.toLowerCase().includes("masters"));
          if(found) competitors=found.competitions?.[0]?.competitors||[];
          // Also accept any event with 20+ competitors (likely the current tournament)
          if(!competitors) for(const e of d.events) { const comps=e.competitions?.[0]?.competitors; if(comps&&comps.length>20){competitors=comps;break;} }
        }
        if(!competitors && d?.competition?.competitors) competitors=d.competition.competitors;
        if(!competitors && d?.competitions?.[0]?.competitors) competitors=d.competitions[0].competitors;
        if(competitors && competitors.length>0) {
          success = parseESPNCompetitors(competitors);
          if(success) break;
        }
      } catch(err) { console.log("ESPN tried "+url, err); }
    }

    // ── ATTEMPT 2: Masters.com JSON feed ──
    if(!success) {
      try {
        const mastersUrls = [
          "https://www.masters.com/en_US/scores/feeds/2026/scores.json",
          "https://www.masters.com/en_US/scores/feeds/scores.json"
        ];
        for(const mUrl of mastersUrls) {
          try {
            const mr = await fetch(mUrl);
            if(mr.ok) {
              const md = await mr.json();
              success = parseMastersData(md);
              if(success) break;
            }
          } catch(err) { console.log("Masters.com tried "+mUrl, err); }
        }
      } catch(e) { console.log("Masters.com fallback failed", e); }
    }

    // ── ATTEMPT 3: Scrape ESPN leaderboard page for data ──
    if(!success) {
      try {
        const pr = await fetch("https://www.espn.com/golf/leaderboard/_/tour/pga");
        const html = await pr.text();
        // ESPN embeds JSON in a window.__espnfitt__ or __NEXT_DATA__ script tag
        const match = html.match(/"competitors"\s*:\s*(\[[\s\S]*?\])\s*[,}]/);
        if(match) {
          try {
            const competitors = JSON.parse(match[1]);
            if(competitors.length > 20) success = parseESPNCompetitors(competitors);
          } catch(pe) { console.log("Parse embedded JSON failed", pe); }
        }
      } catch(e) { console.log("ESPN HTML fallback failed", e); }
    }

    if(!success) {
      flash("Could not fetch Masters scores — ESPN may be lagging. Try again in a few minutes, or enter scores manually on the Scores tab.");
    }
  } catch(e){console.error(e);flash("Score fetch failed — try again.");}
  fetching=false;render();
}

function parseESPNCompetitors(cs) {
  const ns={};const nc=[];let rd=0;
  for(const c of cs){
    const nm=c.athlete?.displayName||c.athlete?.shortName||"";
    const m=matchName(nm);if(!m)continue;
    const rounds=[null,null,null,null];
    const ls=c.linescores||[];
    for(let i=0;i<Math.min(4,ls.length);i++){
      const v=ls[i]?.value;
      if(v!==undefined&&v!==null&&v>=55&&v<=120){rounds[i]=Math.round(v);if(i+1>rd)rd=i+1;}
    }
    const stat=c.status?.displayValue||"";
    const cut=stat.toLowerCase().includes("cut")||c.status?.type?.description?.toLowerCase().includes("cut");
    const pos=c.status?.position?.displayName||c.sortOrder?.toString()||"";
    const thru=c.status?.thru||c.status?.displayValue||"";
    const toPar=c.score?.displayValue||c.score||"";
    ns[m]={rounds,toPar:String(toPar),position:pos,status:stat,thru};
    if(cut)nc.push(m);
  }
  if(Object.keys(ns).length===0) return false;
  let ws=null;
  if(rd>=4){const l=cs.find(c=>c.sortOrder===1);if(l?.score?.displayValue){const p=parseInt(l.score.displayValue);if(!isNaN(p))ws=p;}}
  STATE.espnScores=ns;STATE.cutList=nc;STATE.lastFetch=new Date().toISOString();STATE.currentRound=rd;
  if(ws!==null)STATE.winningScore=ws;
  saveState(); flash('Scores updated from ESPN! '+(rd>0?'Round '+rd:'Live'));
  return true;
}

function parseMastersData(md) {
  // Masters.com JSON typically has a "data" or "players" array
  const players = md?.data?.player || md?.players || md?.data?.players || (Array.isArray(md) ? md : null);
  if(!players || !Array.isArray(players)) return false;
  const ns={};const nc=[];let rd=0;
  for(const p of players) {
    const name = p.display_name || p.player_name || p.first_name+' '+p.last_name || "";
    const m=matchName(name);if(!m)continue;
    const rounds=[null,null,null,null];
    const rScores = p.rounds || [];
    for(let i=0;i<Math.min(4,rScores.length);i++){
      const v = parseInt(rScores[i]?.strokes || rScores[i]);
      if(!isNaN(v)&&v>=55&&v<=120){rounds[i]=v;if(i+1>rd)rd=i+1;}
    }
    const toPar = p.topar || p.to_par || p.today || p.total || "";
    const pos = p.pos || p.position || p.current_position || "";
    const thru = p.thru || "";
    const cut = (p.status||"").toLowerCase().includes("cut");
    ns[m]={rounds,toPar:String(toPar),position:String(pos),status:p.status||"",thru:String(thru)};
    if(cut) nc.push(m);
  }
  if(Object.keys(ns).length===0) return false;
  STATE.espnScores=ns;STATE.cutList=nc;STATE.lastFetch=new Date().toISOString();STATE.currentRound=rd;
  saveState(); flash('Scores updated from Masters.com! '+(rd>0?'Round '+rd:'Live'));
  return true;
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════

const $ = id => document.getElementById(id);
const h = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ln = g => g ? g.split(" ").pop() : "—";
const isComm = () => currentUser === COMMISSIONER;
const completePicks = () => MEMBERS.filter(m=>STATE.picks?.[m]&&Object.keys(STATE.picks[m]).length===6).length;

function render() {
  if (!currentUser) { renderWho(); return; }
  const board = getBoard();

  let html = '';
  if(toastMsg) html += '<div class="toast">'+h(toastMsg)+'</div>';

  // Header
  html += '<div class="hdr"><div class="hdr-in">'
    +'<div style="display:flex;align-items:center;justify-content:space-between">'
    +'<div style="display:flex;align-items:center;gap:10px">'
    +'<span style="font-size:26px">⛳</span>'
    +'<div><h1 class="pf" style="color:var(--gold);font-size:21px;font-weight:900;letter-spacing:.5px">THE MASTERS POOL</h1>'
    +'<div class="ss" style="color:rgba(255,255,255,.55);font-size:10px;letter-spacing:2px;text-transform:uppercase">Augusta National · April 9–12, 2026</div></div></div>'
    +'<div style="text-align:right" class="ss">'
    +'<div style="background:'+(STATE.locked?'var(--gold)':'rgba(255,255,255,.12)')+';color:'+(STATE.locked?'var(--dk)':'white')+';padding:3px 9px;border-radius:10px;font-weight:600;display:inline-block;font-size:11px">'
    +(STATE.currentRound>0?'<span class="ld"></span>Round '+STATE.currentRound:(STATE.locked?'Locked':'Draft Open'))
    +'</div>'
    +'<div style="color:rgba(255,255,255,.35);margin-top:2px;font-size:10px">'+completePicks()+'/11 in · <span onclick="switchUser()" style="cursor:pointer;text-decoration:underline">'+h(currentUser)+'</span></div>'
    +'</div></div>';

  // Nav
  let tabs = [{id:'leaderboard',l:'Leaderboard'},{id:'mypicks',l:'My Picks'},{id:'scores',l:'Scores'},{id:'allpicks',l:'All Picks'},{id:'rules',l:'Rules'}];
  if(!STATE.locked && !isComm()) tabs = tabs.filter(t=>t.id!=='allpicks');
  html += '<div class="nav">';
  tabs.forEach(t=>{ html += '<button class="'+(currentView===t.id?'act':'')+'" onclick="setView(\''+t.id+'\')">'+t.l+'</button>'; });
  html += '</div></div></div><div class="main">';

  // ──── LEADERBOARD ────
  if(currentView==='leaderboard') {
    html += '<div style="animation:fadeIn .3s">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
      +'<div><div class="pf" style="font-size:19px;font-weight:700">Pool Standings</div>'
      +'<div class="ss" style="font-size:11px;color:#999">Best 4 of 6 · Lowest wins'+(STATE.lastFetch?' · '+new Date(STATE.lastFetch).toLocaleTimeString():'')+'</div></div>'
      +'<button onclick="fetchESPN()" style="background:var(--g);color:white;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;opacity:'+(fetching?.5:1)+'"'+(fetching?' disabled':'')+'>'+(fetching?'⏳':'🔄')+' Refresh</button>'
      +'</div>';

    board.forEach((e,i)=>{
      const pos=i+1;
      const hasScore = e.best4!==null||e.livePar!==null;
      const lead=pos===1&&hasScore;
      // Display: prefer stroke total, fall back to live to-par
      const scoreDisplay = e.best4!==null ? e.best4 : (e.livePar!==null ? (e.livePar>0?'+'+e.livePar:(e.livePar===0?'E':''+e.livePar)) : '—');
      const scoreLabel = e.best4!==null ? '' : (e.livePar!==null ? ' to par' : '');
      html += '<div class="card" style="border:'+(lead?'2px solid var(--gold)':'1px solid #e0e0e0')+';background:'+(lead?'linear-gradient(135deg,var(--g),var(--gd))':'white')+';animation:fadeIn '+(.1+i*.04).toFixed(2)+'s">'
        +'<div style="padding:11px 13px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center">'
        +'<div style="display:flex;align-items:center;gap:9px">'
        +'<div class="pf" style="width:28px;height:28px;border-radius:50%;background:'+(pos===1?'var(--gold)':(pos<=3?'rgba(212,168,67,.27)':'#f0f0f0'))+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:'+(pos===1?'var(--dk)':(pos<=3?'var(--gold)':'#999'))+';flex-shrink:0">'+pos+'</div>'
        +'<div><div class="pf" style="font-size:15px;font-weight:700;color:'+(lead?'white':'var(--dk)')+'">'+h(e.name)+(e.name===currentUser?' (You)':'')+'</div>'
        +(e.tb!==null?'<div class="ss" style="font-size:10px;color:'+(lead?'rgba(255,255,255,.45)':'#bbb')+'">TB: '+e.tb+'</div>':'')
        +'</div></div>'
        +'<div style="text-align:right"><div class="pf" style="font-size:24px;font-weight:900;color:'+(lead?'var(--gold)':'var(--g)')+'">'+scoreDisplay+'</div>'
        +(scoreLabel?'<div class="ss" style="font-size:9px;color:'+(lead?'rgba(255,255,255,.4)':'#aaa')+'">'+scoreLabel+'</div>':'')
        +'</div>'
        +'</div>';

      if(e.details.some(d=>d.golfer) && (STATE.locked || e.name===currentUser || isComm())) {
        html += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:7px">';
        e.details.forEach(d=>{
          if(!d.golfer){html+='<span class="ss" style="font-size:10px;color:'+(lead?'rgba(255,255,255,.25)':'#ccc')+';padding:2px 7px;background:'+(lead?'rgba(255,255,255,.04)':'#f8f8f5')+';border-radius:5px">T'+d.tier+': —</span>';return;}
          const drop=!d.used&&e.details.filter(x=>x.total!==null||x.livePar!==null).length>=4;
          // Show to-par for each golfer if no stroke total
          const gScore = d.total!==null ? d.total : (d.toPar ? d.toPar : '');
          const gColor = d.total!==null ? (lead?'white':'var(--dk)') : (d.toPar?.startsWith('-')?'#2e7d32':(d.toPar?.startsWith('+')?'#c62828':'#666'));
          html+='<span class="ss" style="font-size:10px;padding:2px 7px;border-radius:5px;'
            +'background:'+(d.used?(lead?'rgba(212,168,67,.18)':'rgba(0,103,71,.06)'):(lead?'rgba(255,255,255,.04)':'#f8f8f5'))+';'
            +'border:'+(d.used?'1px solid '+(lead?'rgba(212,168,67,.35)':'rgba(0,103,71,.2)'):'1px solid transparent')+';'
            +'color:'+(lead?(d.used?'var(--gold)':'rgba(255,255,255,.35)'):(drop?'#bbb':'#555'))+';'
            +'text-decoration:'+(drop?'line-through':'none')+';opacity:'+(drop?.55:1)+'">'
            +'<b>T'+d.tier+'</b> '+h(ln(d.golfer))
            +(gScore?'<span style="font-weight:700;margin-left:2px;color:'+gColor+'">'+h(String(gScore))+'</span>':'')
            +(d.isCut?'<span style="color:#e53935;margin-left:2px;font-size:9px">MC</span>':'')
            +'</span>';
        });
        html += '</div>';
      }
      html += '</div></div>';
    });
    html += '</div>';
  }

  // ──── MY PICKS ────
  if(currentView==='mypicks') {
    const canEdit = !STATE.locked || isComm();
    const editMem = (isComm() && pickForMember) ? pickForMember : currentUser;

    html += '<div style="animation:fadeIn .3s">';

    if(isComm()) {
      html += '<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap">'
        +'<span class="ss" style="font-size:12px;color:var(--g);font-weight:600">🔑 Commissioner</span>';
      if(!STATE.locked) html += '<button onclick="lockPicks()" style="background:var(--gold);color:var(--dk);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600">🔒 Lock All Picks</button>';
      else html += '<button onclick="unlockPicks()" style="background:#e53935;color:white;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600">🔓 Unlock Picks</button>';
      html += '<select onchange="setPickFor(this.value)" style="border:2px solid var(--g);border-radius:8px;padding:5px 10px;font-size:12px">';
      MEMBERS.forEach(m=>{ html+='<option value="'+m+'"'+(m===editMem?' selected':'')+'>'+m+'</option>'; });
      html += '</select></div>';
    }

    if(!canEdit) {
      html += '<div style="background:#fff3e0;padding:10px;border-radius:8px;margin-bottom:10px;font-size:12px;border:1px solid #ffe0b2" class="ss">🔒 Picks are locked. Only the commissioner (Casey) can make changes now.</div>';
    }

    if(isComm() && editMem !== currentUser) {
      html += '<div style="background:#e3f2fd;padding:8px 12px;border-radius:8px;margin-bottom:10px;font-size:12px;border:1px solid #90caf9" class="ss">Editing picks for <b>'+h(editMem)+'</b></div>';
    }

    for(let tier=1;tier<=6;tier++){
      const pick = STATE.picks?.[editMem]?.[tier];
      html += '<div class="card">'
        +'<div style="background:'+(pick?'linear-gradient(135deg,var(--g),var(--gd))':'#f5f5f0')+';padding:7px 12px;display:flex;justify-content:space-between;align-items:center">'
        +'<span class="pf" style="font-size:13px;font-weight:700;color:'+(pick?'var(--gold)':'var(--dk)')+'">'+TIERS[tier].label+'</span>'
        +(pick?'<span class="ss" style="background:var(--gold);color:var(--dk);padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600">'+h(pick)+'</span>':'')
        +'</div><div style="padding:9px;display:flex;flex-wrap:wrap;gap:4px">';
      TIERS[tier].golfers.forEach(g=>{
        const esc = g.replace(/'/g,"\\'");
        html += '<button class="chip'+(pick===g?' on':'')+'" onclick="makePick(\''+editMem.replace(/'/g,"\\'")+'\','+tier+',\''+esc+'\')"'+(canEdit?'':' disabled style="opacity:.5;cursor:default"')+'>'+h(g)+'</button>';
      });
      html += '</div></div>';
    }

    const tbVal = STATE.tiebreakers?.[editMem] ?? '';
    html += '<div class="card" style="padding:12px">'
      +'<div class="pf" style="font-size:13px;font-weight:700;margin-bottom:5px">Tiebreaker'+(isComm()&&editMem!==currentUser?' (for '+h(editMem)+')':'')+'</div>'
      +'<div class="ss" style="font-size:11px;color:#888;margin-bottom:7px">Predict the winning score (e.g., -12)</div>'
      +'<input type="number" value="'+tbVal+'" onchange="setTB(\''+editMem.replace(/'/g,"\\'")+'\',this.value)" placeholder="-10" style="border:2px solid var(--g);border-radius:8px;padding:6px 10px;font-size:16px;width:85px;text-align:center;font-weight:600"'+(canEdit?'':' disabled')+'>'
      +'</div>';

    if(canEdit) {
      html += '<div style="margin-top:12px;text-align:center">'
        +'<button onclick="resetMyPicks(\''+editMem.replace(/'/g,"\\'")+'\')" style="background:none;border:1px solid #ccc;color:#999;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer">Reset '+h(editMem)+'\'s Picks</button>'
        +'</div>';
    }

    html += '</div>';
  }

  // ──── SCORES ────
  if(currentView==='scores') {
    // Sort by: position if available, then toPar, then alphabetically
    const parsePar = p => { if(!p) return 999; if(p==='E') return 0; const n=parseInt(p); return isNaN(n)?999:n; };
    const picked = [...getAllPicked()].sort((a,b)=>{
      const sa=golferScore(a),sb=golferScore(b);
      // Sort by position first if available
      const pa=parseInt(sa.position)||999, pb=parseInt(sb.position)||999;
      if(pa!==pb) return pa-pb;
      // Then by toPar
      const ta=parsePar(sa.toPar), tb=parsePar(sb.toPar);
      if(ta!==tb) return ta-tb;
      return a.localeCompare(b);
    });

    html += '<div style="animation:fadeIn .3s">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
      +'<div class="pf" style="font-size:19px;font-weight:700">Golfer Scores</div>'
      +'<button onclick="fetchESPN()" style="background:var(--g);color:white;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;opacity:'+(fetching?.5:1)+'"'+(fetching?' disabled':'')+'>'+(fetching?'⏳':'🔄')+' ESPN</button></div>'
      +(STATE.lastFetch?'<div class="ss" style="font-size:11px;color:#999;margin-bottom:6px">Last: '+new Date(STATE.lastFetch).toLocaleString()+' · Auto-refreshes every 5 min</div>':'')
      +'<div style="background:#e8f5e9;padding:9px;border-radius:8px;margin-bottom:10px;font-size:11px;border:1px solid rgba(0,103,71,.2)" class="ss">💡 Tap "ESPN" to pull live Masters scores. Only your group\'s golfers shown.</div>'
      +'<div style="overflow-x:auto"><table class="ss">'
      +'<thead><tr style="background:var(--g);color:white">'
      +'<th class="sticky" style="background:var(--g);z-index:2;min-width:80px">Golfer</th>'
      +'<th>Pos</th><th>R1</th><th>R2</th><th>R3</th><th>R4</th><th>Tot</th><th>Par</th>'
      +'</tr></thead><tbody>';

    picked.forEach((g,i)=>{
      const s=golferScore(g);
      const esc=g.replace(/'/g,"\\'");
      html += '<tr style="background:'+(i%2===0?'white':'#f9f8f4')+';border-bottom:1px solid #eee">'
        +'<td class="sticky" style="background:'+(i%2===0?'white':'#f9f8f4')+';font-weight:500;white-space:nowrap;color:'+(s.isCut?'#999':'var(--dk)')+'">'+h(ln(g))+(s.isCut?'<span style="color:#e53935;font-size:9px;margin-left:3px;font-weight:700">MC</span>':'')+'</td>'
        +'<td style="font-weight:600;color:var(--g);font-size:11px">'+(s.position||'—')+'</td>';
      for(let r=0;r<4;r++){
        if(isComm()){
          const val = STATE.manualScores?.[g]?.[r] ?? (s.rounds[r]!==null?s.rounds[r]:'');
          html += '<td><input type="number" value="'+val+'" onchange="setManual(\''+esc+'\','+r+',this.value)" style="width:42px;text-align:center;border:1px solid #ddd;border-radius:4px;padding:3px 1px;font-size:12px;background:'+(s.rounds[r]!==null?'#e8f5e9':'white')+'"></td>';
        } else {
          html += '<td style="color:'+(s.rounds[r]!==null?'var(--dk)':'#ccc')+';font-weight:'+(s.rounds[r]!==null?600:400)+'">'+(s.rounds[r]!==null?s.rounds[r]:'—')+'</td>';
        }
      }
      // Show toPar in Tot column if no completed round scores yet
      const totDisplay = s.total!==null ? s.total : (s.toPar ? h(s.toPar) : '—');
      const totColor = s.total!==null ? 'var(--g)' : (s.toPar?.startsWith('-')?'#2e7d32':(s.toPar?.startsWith('+')?'#c62828':'#666'));
      html += '<td style="font-weight:700;color:'+totColor+'">'+totDisplay+'</td>'
        +'<td style="font-weight:600;font-size:11px;color:'+(s.toPar?.startsWith('-')?'#2e7d32':(s.toPar?.startsWith('+')?'#c62828':'#666'))+'">'+h(s.toPar||'—')
        +(s.thru&&!s.thru.toLowerCase().includes('f')&&s.total===null?'<div style="font-size:9px;color:#999">'+h(s.thru)+'</div>':'')
        +'</td></tr>';
    });

    html += '</tbody></table></div>';

    if(isComm()) {
      html += '<div style="margin-top:14px"><div class="ss" style="font-size:12px;font-weight:600;margin-bottom:6px">Toggle Missed Cut:</div><div style="display:flex;flex-wrap:wrap;gap:4px">';
      [...getAllPicked()].sort().forEach(g=>{
        const mc=(STATE.cutList||[]).includes(g);
        html+='<button class="chip" onclick="toggleCut(\''+g.replace(/'/g,"\\'")+'\')" style="background:'+(mc?'#e53935':'#f5f5f0')+';color:'+(mc?'white':'#666')+';font-size:10px">'+h(ln(g))+(mc?' ✗':'')+'</button>';
      });
      html += '</div></div>';
    }
    html += '</div>';
  }

  // ──── ALL PICKS ────
  if(currentView==='allpicks') {
    html += '<div style="animation:fadeIn .3s">'
      +'<div class="pf" style="font-size:19px;font-weight:700;margin-bottom:10px">All Picks</div>'
      +'<div style="overflow-x:auto"><table class="ss">'
      +'<thead><tr style="background:var(--g);color:white">'
      +'<th style="text-align:left;padding-left:8px">Name</th>';
    for(let t=1;t<=6;t++) html+='<th>T'+t+'</th>';
    html += '<th>TB</th><th>Score</th></tr></thead><tbody>';
    board.forEach((e,i)=>{
      const poolScore = e.best4!==null ? e.best4 : (e.livePar!==null ? (e.livePar>0?'+'+e.livePar:(e.livePar===0?'E':''+e.livePar)) : '—');
      html += '<tr style="background:'+(i%2===0?'white':'#f9f8f4')+';border-bottom:1px solid #eee">'
        +'<td style="text-align:left;padding-left:8px;font-weight:600;white-space:nowrap">'+h(e.name)+'</td>';
      e.details.forEach(d=>{
        const drop=!d.used&&e.details.filter(x=>x.total!==null||x.livePar!==null).length>=4;
        const gScore = d.total!==null ? d.total : (d.toPar||'');
        html+='<td style="font-size:10px;color:'+(d.golfer?(d.used?'var(--g)':'#888'):'#ddd')+';font-weight:'+(d.used?700:400)+';text-decoration:'+(drop?'line-through':'none')+'">'
          +(d.golfer?h(ln(d.golfer)):'—')+(gScore?'<div style="font-size:9px;font-weight:700;color:var(--dk)">'+h(String(gScore))+'</div>':'')+'</td>';
      });
      html+='<td style="font-weight:600">'+(e.tb??'—')+'</td>'
        +'<td style="font-weight:700;color:var(--g);font-size:13px">'+poolScore+'</td></tr>';
    });
    html += '</tbody></table></div></div>';
  }

  // ──── RULES ────
  if(currentView==='rules') {
    html += '<div style="animation:fadeIn .3s">'
      +'<div class="card" style="padding:16px">'
      +'<h2 class="pf" style="font-size:19px;font-weight:700;color:var(--g);margin-bottom:10px">Pool Rules</h2>'
      +'<div class="ss" style="font-size:13px;line-height:1.7;color:#444">'
      +'<p style="margin-bottom:10px"><b>Format:</b> Each person picks one golfer from each of the 6 tiers (6 total).</p>'
      +'<p style="margin-bottom:10px"><b>Scoring:</b> After the tournament, take the best four of your six golfer scores and add them together. Lowest total wins.</p>'
      +'<p style="margin-bottom:10px"><b>Missed Cut:</b> Any golfer who misses the cut gets an 80 for Rounds 3 &amp; 4.</p>'
      +'<p style="margin-bottom:10px"><b>Tiebreaker:</b> Predict the winning score (e.g., if the winner posts -12, enter -12). Closest to actual wins the tiebreaker.</p>'
      +'<p style="margin-bottom:10px"><b>Live Scores:</b> Pulls from ESPN. Hit Refresh anytime — auto-updates every 5 minutes during the tournament.</p>'
      +'<p style="background:rgba(0,103,71,.05);padding:10px;border-radius:8px;border:1px solid rgba(0,103,71,.15)"><b style="color:var(--g)">Players:</b> '+MEMBERS.join(', ')+'</p>'
      +'</div></div>';

    if(isComm()) {
      html += '<div class="card" style="padding:12px;background:#fff8f8;border-color:#ffcdd2">'
        +'<div class="pf" style="font-size:13px;font-weight:700;color:#c62828;margin-bottom:6px">Commissioner Controls</div>'
        +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
        +'<button onclick="resetPool()" style="background:#e53935;color:white;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600">🗑 Reset Pool</button>'
        +'<button onclick="setWinScore()" style="background:#ff9800;color:white;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600">🏆 Set Winner Score</button>'
        +'</div></div>';
    }
    html += '</div>';
  }

  html += '</div>';
  $('app').innerHTML = html;
}

function renderWho() {
  let html = '<div class="who-modal"><div class="who-box">'
    +'<div style="font-size:32px;margin-bottom:8px">⛳</div>'
    +'<h2 class="pf" style="font-size:22px">Masters Pool 2026</h2>'
    +'<p class="ss">Who are you?</p>';
  MEMBERS.forEach(m=>{ html+='<button class="who-btn ss" onclick="selectUser(\''+m+'\')">'+m+'</button>'; });
  html += '</div></div>';
  $('app').innerHTML = html;
}

// ═══════════════════════════════════════════════════════
// GLOBAL ACTIONS
// ═══════════════════════════════════════════════════════

window.selectUser = function(name) { currentUser=name; localStorage.setItem('masters-pool-user',name); currentView='mypicks'; render(); };
window.switchUser = function() { currentUser=null; localStorage.removeItem('masters-pool-user'); render(); };
window.setView = function(v) { currentView=v; render(); };
window.fetchESPN = fetchESPN;

window.makePick = function(member, tier, golfer) {
  if(STATE.locked && currentUser!==COMMISSIONER) { flash("Picks are locked!"); return; }
  if(!STATE.picks) STATE.picks={};
  if(!STATE.picks[member]) STATE.picks[member]={};
  if(STATE.picks[member][tier]===golfer) { delete STATE.picks[member][tier]; }
  else { STATE.picks[member][tier]=golfer; }
  saveState();
};

window.resetMyPicks = function(member) {
  if(STATE.locked && currentUser!==COMMISSIONER) { flash("Picks are locked!"); return; }
  if(confirm("Clear all picks for "+member+"?")) {
    if(!STATE.picks) STATE.picks={};
    STATE.picks[member]={};
    if(STATE.tiebreakers) STATE.tiebreakers[member]=null;
    saveState(); flash(member+"'s picks cleared.");
  }
};

window.setTB = function(member, val) {
  if(STATE.locked && currentUser!==COMMISSIONER) { flash("Picks are locked!"); return; }
  if(!STATE.tiebreakers) STATE.tiebreakers={};
  STATE.tiebreakers[member] = val===''?null:Number(val);
  saveState();
};

window.setManual = function(golfer, round, val) {
  if(!STATE.manualScores) STATE.manualScores={};
  if(!STATE.manualScores[golfer]) STATE.manualScores[golfer]={};
  STATE.manualScores[golfer][round] = val===''?null:Number(val);
  saveState();
};

window.toggleCut = function(golfer) {
  if(!STATE.cutList) STATE.cutList=[];
  if(STATE.cutList.includes(golfer)) STATE.cutList=STATE.cutList.filter(g=>g!==golfer);
  else STATE.cutList.push(golfer);
  saveState();
};

window.lockPicks = function() { STATE.locked=true; saveState(); flash("Picks locked!"); };
window.unlockPicks = function() { STATE.locked=false; saveState(); flash("Picks unlocked."); };
window.setPickFor = function(m) { pickForMember=m||null; render(); };
window.resetPool = function() { if(confirm("Reset the ENTIRE pool? Cannot be undone.")){STATE={...DEFAULT_STATE};saveState();flash("Pool reset.");} };
window.setWinScore = function() { const v=prompt("Enter winning score (e.g., -12):",STATE.winningScore||""); if(v!==null){STATE.winningScore=Number(v);saveState();} };

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════

loadState(()=>{ render(); });
setInterval(()=>{ if(STATE.locked&&STATE.currentRound>0) fetchESPN(); }, 300000);

</script>
</body>
</html>
